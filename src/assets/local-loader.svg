<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-labelledby="title description">
  <title id="title">Loading</title>
  <desc id="description">Animated Nutri Track loading indicator</desc>
  <style>
    .loader-ring {
      transform-box: fill-box;
      transform-origin: center;
      animation: loader-spin .9s linear infinite;
    }
    .loader-leaf {
      transform-box: fill-box;
      transform-origin: center;
      animation: loader-pulse .9s ease-in-out infinite;
    }
    @keyframes loader-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes loader-pulse {
      0%, 100% { transform: scale(.9); opacity: .72; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .loader-ring, .loader-leaf { animation: none; }
    }
  </style>
  <circle cx="16" cy="16" r="14" fill="#FCE7F3" opacity=".7" />
  <g class="loader-ring">
    <circle cx="16" cy="16" r="12.5" fill="none" stroke="#F3A9C8" stroke-width="2" />
    <path d="M16 3.5A12.5 12.5 0 0 1 28.5 16" fill="none" stroke="#BE185D" stroke-linecap="round" stroke-width="2.5" />
  </g>
  <g class="loader-leaf">
    <path d="M10.5 19.5c0-6 3.8-9.8 11-10 0 6.5-3.8 10.3-10.2 10.3 2-3 4.1-5 7.1-6.9-3.5 1.5-5.9 3.5-7.9 6.6Z" fill="#BE185D" />
  </g>
</svg>
